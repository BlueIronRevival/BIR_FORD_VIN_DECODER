<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ford Tractor Serial Number Lookup | Blue Iron Revival</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="container">
    <h1>Ford Tractor Serial Number Lookup</h1>
    <p class="subtext">
      Enter a serial number to check the approximate production year.
    </p>

    <div class="card">
      <label for="serialInput">Serial Number</label>
      <input id="serialInput" type="text" placeholder="Example: 12345" />
      <button id="lookupBtn">Look Up</button>
      <div id="result" class="result"></div>
    </div>
  </main>

  <script src="script.js"></script>
</body>
</html>
